<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Můj mrazák</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
        background: #0b1220;
        color: white;
    }

    .container {
        max-width: 520px;
        margin: auto;
        padding: 16px;
    }

    /* HEADER */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .title {
        font-size: 22px;
        font-weight: 700;
    }

    /* CARD FORM */
    .card {
        background: #121a2b;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 10px;
        border: none;
        background: #1c2740;
        color: white;
        outline: none;
    }

    input::placeholder {
        color: #9aa4b2;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
    }

    .add {
        background: #3b82f6;
        color: white;
    }

    .add:hover {
        background: #2563eb;
    }

    .cancel {
        background: #334155;
        color: white;
    }

    /* LIST */
    .list-title {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 10px;
    }

    .item {
        background: #121a2b;
        padding: 12px;
        border-radius: 14px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .meta {
        font-size: 13px;
        opacity: 0.8;
        margin-top: 4px;
    }

    .delete {
        background: #ef4444;
        border: none;
        color: white;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
    }

    .delete:hover {
        background: #dc2626;
    }

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">❄️ Můj mrazák</div>
    </div>

    <!-- FORM -->
    <div class="card">
        <form action="/add" method="POST">

            <input type="text" name="nazev" placeholder="Název potraviny" required>

            <input type="number" name="mnozstvi" placeholder="Množství" required>

            <input type="date" name="datum">

            <div class="row">
                <button class="add" type="submit">Přidat</button>
                <button class="cancel" type="reset">Zrušit</button>
            </div>

        </form>
    </div>

    <!-- LIST -->
    <div class="list-title">Obsah mrazáku</div>

    {% for item in potraviny %}
    <div class="item">

        <div>
            <strong>{{ item[1] }}</strong>

            <div class="meta">
                Množství: {{ item[2] }}

                {% if item[3] %}
                    | 📅 {{ item[3] }}
                {% endif %}
            </div>
        </div>

        <a href="/delete/{{ item[0] }}">
            <button class="delete">Smazat</button>
        </a>

    </div>
    {% endfor %}

</div>

</body>
</html>
