<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hledat v mrazáku 🔍</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e2533;
            --input-bg: #2a3245;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.6rem; }

        .btn {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid #374151;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn:hover { background-color: #374151; }

        .search-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 2px solid #374151;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .card {
            background-color: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }

        th { color: var(--text-muted); font-weight: 600; }
        
        .btn-minus {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .btn-minus:hover { background-color: #374151; }

        @media (max-width: 600px) {
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ url_for('home') }}" class="btn">⬅️ Zpět</a>
            <h1>Vyhledávání v mrazáku</h1>
        </header>

        <input type="text" id="searchInput" class="search-input" placeholder="Začni psát název jídla..." autofocus>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Název</th>
                        <th>Množství</th>
                        <th>Koupeno</th>
                        <th>Vložil</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody id="foodTable">
                    {% for item in potraviny %}
                    <tr class="food-row">
                        <td class="food-name" style="font-weight: bold;">{{ item[1] }}</td>
                        <td style="color: var(--accent-green); font-weight: bold;">{{ item[2] }} {{ item[6] }}</td>
                        <td style="color: var(--text-muted); font-size: 0.9rem;">{{ item[3] if item[3] else '—' }}</td>
                        <td style="color: var(--text-muted); font-size: 0.9rem;">{{ item[5] }}</td>
                        <td>
                            <a href="{{ url_for('remove_one', item_id=item[0], from='search') }}" class="btn-minus">— 1</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 20px;">V mrazáku nic není.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('searchInput').addEventListener('input', function() {
            const filterValue = this.value.toLowerCase().trim();
            const rows = document.querySelectorAll('.food-row');

            rows.forEach(row => {
                const nameText = row.querySelector('.food-name').textContent.toLowerCase();
                if (nameText.includes(filterValue)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
