<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Obnova údajů - Mrazák</title>
<style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #0b1220; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; box-sizing: border-box; }
    .card { background: #121a2b; border: 2px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); text-align: center;}
    h2 { font-size: 26px; margin-top: 0; margin-bottom: 12px; }
    p { font-size: 16px; opacity: 0.75; margin-bottom: 24px; line-height: 1.5; }
    input { width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15); background: #1c2740; color: white; font-size: 18px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #e11d48; }
    button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; background: #e11d48; color: white; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); }
    button:active { background: #be123c; transform: scale(0.98); }
    a { color: #60a5fa; text-decoration: none; font-size: 16px; display: block; padding: 10px; }
</style>
</head>
<body>
<div class="card">
    <h2>Zapomenuté údaje</h2>
    <p>Zadej svůj e-mail. Pošleme ti na něj tvoje původní uživatelské jméno a heslo.</p>
    <form method="POST">
        <input type="email" name="email" placeholder="Tvůj registrační e-mail" required autocomplete="off">
        <button type="submit">Poslat údaje na e-mail</button>
    </form>
    <a href="/login">Zpět na přihlášení</a>
</div>
</body>
</html>
