<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registrace - Mrazák</title>
<style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #0b1220; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; box-sizing: border-box; }
    .card { background: #121a2b; border: 2px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); text-align: center;}
    h2 { font-size: 26px; margin-top: 0; margin-bottom: 24px; }
    input { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15); background: #1c2740; color: white; font-size: 18px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #10b981; }
    button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; background: #10b981; color: white; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
    button:active { background: #059669; transform: scale(0.98); }
    a { color: #60a5fa; text-decoration: none; font-size: 16px; display: block; padding: 10px; }
    .flash { background: rgba(248, 113, 113, 0.15); color: #f87171; font-size: 16px; padding: 12px; border-radius: 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
    <h2>Vytvořit nový účet</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="Uživatelské jméno" required autocomplete="off">
        <input type="email" name="email" placeholder="Tvůj E-mail" required autocomplete="off">
        <input type="password" name="password" placeholder="Heslo" required>
        <button type="submit">Zaregistrovat se</button>
    </form>
    <a href="/login">Už máš účet? Přihlás se</a>
</div>
</body>
</html>
